<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Swathi 🎂</title>
<style>
  :root{
    --pink: #ff6fa5;
    --pink-light: #ffd1e3;
    --purple: #a685e2;
    --cream: #fff8f0;
    --gold: #ffc857;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffe3ef, #ffd6e8, #e8d5ff);
    overflow-x: hidden;
    position: relative;
  }

  /* ---------- Floating hearts & flowers ---------- */
  .floaters {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .floater {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    opacity: 0.85;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .screen {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .screen.active { display: flex; }

  h1 {
    color: var(--purple);
    font-size: 2.4em;
    text-shadow: 2px 2px 0px #fff;
    margin-bottom: 10px;
  }
  p.sub {
    color: #7a4a8f;
    font-size: 1.1em;
    margin-bottom: 30px;
  }

  button {
    font-family: inherit;
    font-size: 1.1em;
    padding: 14px 34px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(166, 133, 226, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-top: 10px;
  }
  button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 20px rgba(166, 133, 226, 0.5);
  }
  button:active { transform: translateY(0) scale(0.98); }

  /* ---------- Cake ---------- */
  .cake-wrap {
    position: relative;
    margin: 30px 0;
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .cake {
    width: 220px;
  }
  .plate {
    width: 260px; height: 20px;
    background: #e0b0d0;
    border-radius: 50%;
    margin: 0 auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .tier {
    width: 220px; height: 60px;
    background: linear-gradient(180deg, #ffb6d9, #ff8fc7);
    border-radius: 10px;
    margin: 0 auto;
    position: relative;
    box-shadow: inset 0 -6px 10px rgba(255,255,255,0.3);
  }
  .tier.top {
    width: 150px; height: 50px;
    background: linear-gradient(180deg, #ffd6ec, #ffb0dd);
  }
  .drip {
    position: absolute;
    bottom: -10px; left: 0; right: 0;
    height: 20px;
    background: repeating-radial-gradient(circle at 10px 0, #fff2f8 0 6px, transparent 7px 20px);
  }
  .candle {
    width: 8px; height: 35px;
    background: linear-gradient(180deg, #fff, #ffe07d);
    margin: 0 auto;
    position: relative;
    border-radius: 3px;
    top: 10px;
  }
  .flame {
    width: 12px; height: 18px;
    background: radial-gradient(circle, #fff6a0, var(--gold) 60%, #ff7a00 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: absolute;
    top: -16px; left: -2px;
    animation: flicker 0.6s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  .flame.out { display: none; }
  @keyframes flicker {
    0% { transform: scale(1) rotate(-3deg); }
    100% { transform: scale(1.15) rotate(3deg); }
  }
  .candles-row { display: flex; justify-content: center; gap: 22px; }

  .knife {
    font-size: 2em;
    display: inline-block;
    margin-top: 10px;
    transition: transform 0.4s ease;
  }
  .cake-wrap.cutting .knife {
    animation: slice 0.6s ease;
  }
  @keyframes slice {
    0% { transform: translateX(-60px) rotate(-20deg); }
    50% { transform: translateX(0) rotate(0deg); }
    100% { transform: translateX(60px) rotate(20deg); }
  }
  .crack {
    position: absolute;
    top: 40%; left: 50%;
    width: 2px; height: 0;
    background: #b5006b;
    transform: translateX(-50%);
    transition: height 0.4s ease;
  }
  .cake-wrap.cutting .crack { height: 80px; }

  /* ---------- Letter ---------- */
  .letter-card {
    background: var(--cream);
    border-radius: 16px;
    padding: 30px 26px;
    max-width: 480px;
    box-shadow: 0 10px 30px rgba(166,133,226,0.25);
    border: 2px dashed var(--pink);
    min-height: 220px;
    text-align: left;
  }
  .letter-card h2 {
    color: var(--pink);
    margin-top: 0;
    text-align: center;
  }
  #letterText {
    font-size: 1.05em;
    line-height: 1.7;
    color: #5a3a66;
    white-space: pre-wrap;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    background: var(--purple);
    animation: blink 0.8s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .confetti {
    position: fixed;
    top: -20px;
    z-index: 5;
    border-radius: 2px;
    pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0.3; }
  }

  .emoji-big { font-size: 3em; }
</style>
</head>
<body>

<div class="floaters" id="floaters"></div>

<!-- Welcome Screen -->
<div class="screen active" id="welcome">
  <div class="emoji-big">🎉🎂🎉</div>
  <h1>A little surprise for you, Swathi...</h1>
  <p class="sub">From your friend, David 🎉</p>
  <button onclick="goTo('cakeScreen')">Open Your Surprise</button>
</div>

<!-- Cake Screen -->
<div class="screen" id="cakeScreen">
  <h1>Happy Birthday Swathi! 🎂</h1>
  <p class="sub">Make a wish, then cut the cake!</p>

  <div class="cake-wrap" id="cakeWrap">
    <div class="candles-row">
      <div class="candle"><div class="flame" id="flame1"></div></div>
      <div class="candle"><div class="flame" id="flame2"></div></div>
      <div class="candle"><div class="flame" id="flame3"></div></div>
    </div>
    <div class="cake">
      <div class="tier top"></div>
      <div class="tier">
        <div class="drip"></div>
        <div class="crack" id="crack"></div>
      </div>
    </div>
    <div class="plate"></div>
    <div class="knife">🔪</div>
  </div>

  <button onclick="cutCake()" id="cutBtn">Cut the Cake</button>
</div>

<!-- Celebration Screen -->
<div class="screen" id="celebrateScreen">
  <div class="emoji-big">🎊🥳🎊</div>
  <h1>Yayy! Happy Birthday Swathi!</h1>
  <p class="sub">Wishing you all the joy in the world</p>
  <button onclick="goTo('letterScreen'); startTyping();">Read Your Letter 💌</button>
</div>

<!-- Letter Screen -->
<div class="screen" id="letterScreen">
  <div class="letter-card">
    <h2>💌 For Swathi</h2>
    <div id="letterText"></div>
  </div>
  <button onclick="restart()" style="margin-top:30px;">🔄 Restart</button>
</div>

<script>
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function cutCake() {
  const wrap = document.getElementById('cakeWrap');
  const btn = document.getElementById('cutBtn');
  btn.disabled = true;
  wrap.classList.add('cutting');

  setTimeout(() => {
    ['flame1','flame2','flame3'].forEach(id => document.getElementById(id).classList.add('out'));
  }, 300);

  setTimeout(() => {
    launchConfetti();
    goTo('celebrateScreen');
  }, 900);
}

function launchConfetti() {
  const colors = ['#ff6fa5','#a685e2','#ffc857','#ff8fc7','#7ee8c7'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    const size = 6 + Math.random() * 6;
    c.style.width = size + 'px';
    c.style.height = size * 0.6 + 'px';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.5 + Math.random()*2) + 's';
    c.style.animationDelay = (Math.random()*0.5) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

const letterMessage = `Dear Swathi,

Happy Birthday! 🎉

We've only known each other for a few days, but I already wanted to make your birthday a little special. I hope this small surprise brought a smile to your face.

Wishing you a fantastic year ahead, full of good moments, good food, and good friends.

Hope this is the start of a great friendship!

From,
David 🎂`;

let typingStarted = false;
function startTyping() {
  if (typingStarted) return;
  typingStarted = true;
  const el = document.getElementById('letterText');
  let i = 0;
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '\u00A0';

  function type() {
    if (i < letterMessage.length) {
      el.textContent = letterMessage.slice(0, i + 1);
      el.appendChild(cursor);
      i++;
      setTimeout(type, 28);
    } else {
      el.appendChild(cursor);
    }
  }
  type();
}

function restart() {
  document.getElementById('cutBtn').disabled = false;
  document.getElementById('cakeWrap').classList.remove('cutting');
  ['flame1','flame2','flame3'].forEach(id => document.getElementById(id).classList.remove('out'));
  typingStarted = false;
  document.getElementById('letterText').innerHTML = '';
  goTo('welcome');
}

/* Floating hearts & flowers background */
const emojis = ['❤️','💕','🌸','🌷','💗','🌺'];
const floatersContainer = document.getElementById('floaters');
function spawnFloater() {
  const f = document.createElement('div');
  f.className = 'floater';
  f.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  f.style.left = Math.random()*100 + 'vw';
  const duration = 8 + Math.random()*8;
  f.style.animationDuration = duration + 's';
  f.style.fontSize = (16 + Math.random()*18) + 'px';
  floatersContainer.appendChild(f);
  setTimeout(() => f.remove(), duration*1000);
}
setInterval(spawnFloater, 600);
for (let i=0;i<10;i++) setTimeout(spawnFloater, i*200);
</script>

</body>
</html>
